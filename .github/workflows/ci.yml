name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install black
        run: pip install black
      - name: Check formatting
        run: python -m black --check praxis tests

  core-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: core must not import aiopslab or praxis.adapters
        run: |
          if grep -rnE --include='*.py' '(^|[^#])(import|from)[[:space:]]+(aiopslab|praxis\.adapters)' praxis/core/; then
            echo 'FAIL: praxis/core must stay free of aiopslab and praxis.adapters imports'
            exit 1
          fi
          echo 'praxis/core is clean'
